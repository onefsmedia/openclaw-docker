# nginx reverse-proxy config for OpenClaw Gateway
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/.
#
# Replace <domain> with your actual subdomain before using.
# TLS certificates are managed by certbot (Let's Encrypt).
#
# After installing: sudo mkdir -p /etc/nginx/sites-enabled
#                   sudo ln -s /etc/nginx/sites-available/<domain>.conf \
#                              /etc/nginx/sites-enabled/
#                   sudo nginx -t && sudo systemctl reload nginx

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name <domain>;
    return 301 https://$host$request_uri;
}

# Main HTTPS proxy (Control UI + API + WebSocket)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name <domain>;

    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:9090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Long-lived connections (WhatsApp streaming, SSE)
        proxy_read_timeout 3600s;
    }
}

# Optional secondary HTTPS port (9443) — useful when 443 is blocked by a network
server {
    listen 9443 ssl;
    listen [::]:9443 ssl;
    server_name <domain>;

    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:9090;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 3600s;
    }
}
