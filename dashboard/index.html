<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🦞 Mission Control</title>
  <style>
    :root {
      --bg:     #0a0c10;
      --bg2:    #0d1117;
      --bg3:    #161b22;
      --border: rgba(255,255,255,0.08);
      --text:   #e6edf3;
      --muted:  #8b949e;
      --mono:   'SF Mono','Menlo','Monaco','Consolas',monospace;
      --green:  #3fb950;
      --red:    #f85149;
      --amber:  #d29922;
      --blue:   #58a6ff;
      --cyan:   #39c5cf;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;line-height:1.5;min-height:100vh}

    /* ── Header ── */
    .header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    .logo{font-size:15px;font-weight:700;letter-spacing:.3px}
    .conn{display:flex;align-items:center;gap:6px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .dot.green{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
    .dot.red{background:var(--red);box-shadow:0 0 6px var(--red)}
    .dot.amber{background:var(--amber)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    .hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .sync-time{color:var(--muted);font-size:10px}
    .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer;font:inherit;font-size:11px}
    .btn:hover{background:rgba(255,255,255,.08)}
    .btn:active{transform:scale(.97)}

    /* ── Settings bar ── */
    .cfg-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
    .cfg-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px}
    input[type=text]{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font:inherit;font-size:11px;outline:none}
    input[type=text]:focus{border-color:var(--blue)}
    .inp-url{width:260px}
    .inp-tok{width:340px}

    /* ── Stats ── */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px}
    .stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
    .stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
    .stat-val{font-size:24px;font-weight:700;line-height:1}
    .stat-sub{color:var(--muted);font-size:10px;margin-top:4px}
    .green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.blue{color:var(--blue)}.cyan{color:var(--cyan)}

    /* ── Main grid ── */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 8px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 16px}

    /* ── Panel ── */
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
    .badge-count{background:var(--bg3);color:var(--muted);padding:1px 7px;border-radius:4px;font-size:10px}
    .panel-body{padding:8px 12px;max-height:240px;overflow-y:auto}
    .panel-body::-webkit-scrollbar{width:3px}
    .panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    /* ── Table ── */
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{text-align:left;color:var(--muted);font-weight:400;padding:3px 6px;border-bottom:1px solid var(--border)}
    td{padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.03)}
    tr:last-child td{border-bottom:none}
    .trunc{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── Badge ── */
    .badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px}
    .badge-green{background:rgba(63,185,80,.15);color:var(--green)}
    .badge-red{background:rgba(248,81,73,.15);color:var(--red)}
    .badge-blue{background:rgba(88,166,255,.15);color:var(--blue)}
    .badge-muted{background:var(--bg3);color:var(--muted)}
    .badge-amber{background:rgba(210,153,34,.15);color:var(--amber)}

    /* ── KV rows ── */
    .kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
    .kv:last-child{border-bottom:none}
    .kv-key{color:var(--muted)}
    .kv-val{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}

    /* ── Events ── */
    .ev-line{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.025);font-size:10px}
    .ev-line:last-child{border-bottom:none}
    .ev-ts{color:var(--muted);white-space:nowrap;flex-shrink:0}
    .ev-type{color:var(--cyan);white-space:nowrap;flex-shrink:0;min-width:120px}
    .ev-msg{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ── WhatsApp detail ── */
    .wa-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
    .wa-row:last-child{border-bottom:none}

    /* ── Empty state ── */
    .empty{color:var(--muted);text-align:center;padding:24px;font-size:11px}

    /* ── Error overlay ── */
    #err-bar{display:none;background:rgba(248,81,73,.12);border-bottom:1px solid rgba(248,81,73,.25);padding:6px 16px;font-size:11px;color:var(--red)}
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">🦞 Mission Control</span>
  <div class="conn">
    <div class="dot" id="gw-dot"></div>
    <span id="gw-txt" style="font-size:11px;color:var(--muted)">Connecting…</span>
  </div>
  <div class="hdr-right">
    <span class="sync-time" id="sync-time">—</span>
    <button class="btn" onclick="manualRefresh()">↻ Refresh</button>
  </div>
</div>

<!-- Error bar -->
<div id="err-bar"></div>

<!-- Settings -->
<div class="cfg-bar">
  <span class="cfg-label">URL</span>
  <input type="text" id="cfg-url" class="inp-url" placeholder="ws://host:9090/rpc">
  <span class="cfg-label">Token</span>
  <input type="text" id="cfg-tok" class="inp-tok" placeholder="gateway token">
  <button class="btn" onclick="doConnect()">Connect</button>
</div>

<!-- Stats row -->
<div class="stats">
  <div class="stat">
    <div class="stat-label">Gateway</div>
    <div class="stat-val" id="s-gw">—</div>
    <div class="stat-sub" id="s-gw-sub">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">WhatsApp</div>
    <div class="stat-val" id="s-wa">—</div>
    <div class="stat-sub" id="s-wa-sub">checking…</div>
  </div>
  <div class="stat">
    <div class="stat-label">Agents</div>
    <div class="stat-val blue" id="s-agents">—</div>
    <div class="stat-sub" id="s-agents-sub">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Approvals</div>
    <div class="stat-val" id="s-approvals">—</div>
    <div class="stat-sub">pending exec</div>
  </div>
</div>

<!-- Main panels: agents + sessions -->
<div class="grid2">
  <div class="panel">
    <div class="panel-hdr">Agents <span class="badge-count" id="c-agents">0</span></div>
    <div class="panel-body" id="p-agents"><div class="empty">Connecting…</div></div>
  </div>
  <div class="panel">
    <div class="panel-hdr">Recent Sessions <span class="badge-count" id="c-sessions">0</span></div>
    <div class="panel-body" id="p-sessions"><div class="empty">Connecting…</div></div>
  </div>
</div>

<!-- Bottom panels: cron + config + events -->
<div class="grid3">
  <div class="panel">
    <div class="panel-hdr">Cron Jobs <span class="badge-count" id="c-cron">0</span></div>
    <div class="panel-body" id="p-cron"><div class="empty">Loading…</div></div>
  </div>
  <div class="panel">
    <div class="panel-hdr">Config &amp; Status</div>
    <div class="panel-body" id="p-config"><div class="empty">Loading…</div></div>
  </div>
  <div class="panel">
    <div class="panel-hdr">Live Events <span class="badge-count" id="c-events">0</span></div>
    <div class="panel-body" id="p-events"><div class="empty">Waiting for events…</div></div>
  </div>
</div>

<script>
// ─── Config defaults ────────────────────────────────────────────────────────
const DEFAULT_URL   = location.protocol === "https:"
  ? `wss://${location.host}/rpc`
  : `ws://${location.hostname}:9090/rpc`;
const DEFAULT_TOKEN = "846dbc1d0f672da43a8433d559429eac5c734e528eea87a9";

document.getElementById("cfg-url").value = DEFAULT_URL;
document.getElementById("cfg-tok").value = DEFAULT_TOKEN;

// ─── DOM helpers ────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const el = (tag, cls, text) => {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
};

function setErr(msg) {
  const bar = $("err-bar");
  if (msg) { bar.textContent = msg; bar.style.display = "block"; }
  else { bar.style.display = "none"; }
}

function fmtRelative(iso) {
  if (!iso) return "—";
  const d = Date.now() - new Date(iso).getTime();
  if (d < 60000)   return "just now";
  if (d < 3600000) return Math.floor(d / 60000) + "m ago";
  if (d < 86400000)return Math.floor(d / 3600000) + "h ago";
  return Math.floor(d / 86400000) + "d ago";
}

// ─── Gateway RPC client ─────────────────────────────────────────────────────
class GatewayClient {
  constructor() {
    this.ws          = null;
    this.connected   = false;
    this.pending     = new Map();
    this.nextId      = 1;
    this.attempt     = 0;
    this.onStatus    = null;   // (status, reason?) => void
    this.onEvent     = null;   // (frame) => void
    this._connectId  = null;
    this._rtimer     = null;
  }

  get wsUrl()   { return $("cfg-url").value.trim() || DEFAULT_URL; }
  get token()   { return $("cfg-tok").value.trim() || DEFAULT_TOKEN; }

  connect() {
    clearTimeout(this._rtimer);
    if (this.ws) {
      try { this.ws.onclose = null; this.ws.close(); } catch (_) {}
    }
    this.connected  = false;
    this._connectId = null;
    this._setStatus("connecting");

    const ws = new WebSocket(this.wsUrl);
    this.ws = ws;

    ws.onmessage = (e) => {
      let f;
      try { f = JSON.parse(e.data); } catch { return; }

      if (f.type === "event") {
        if (f.event === "connect.challenge") { this._sendConnect(); return; }
        this.onEvent?.(f);
        return;
      }

      if (f.type === "res") {
        // Handle connect response
        if (f.id === this._connectId) {
          if (f.ok) {
            this.connected = true;
            this.attempt   = 0;
            this._setStatus("connected");
          } else {
            this._setStatus("error", f.error?.message ?? "Auth rejected");
          }
          return;
        }
        // Handle normal request response
        const p = this.pending.get(f.id);
        if (!p) return;
        clearTimeout(p.timer);
        this.pending.delete(f.id);
        if (f.ok) p.resolve(f.result ?? f.data ?? null);
        else p.reject(new Error(f.error?.message ?? "RPC error"));
      }
    };

    ws.onclose = () => {
      this.connected = false;
      this._rejectAll("Connection closed");
      this._setStatus("reconnecting");
      this._scheduleReconnect();
    };

    ws.onerror = () => {
      this.connected = false;
      this._setStatus("error", "WebSocket error");
    };
  }

  _sendConnect() {
    const id = String(this.nextId++);
    this._connectId = id;
    this.ws.send(JSON.stringify({
      type: "req", id,
      method: "connect",
      params: {
        minProtocol: 3, maxProtocol: 3,
        client: { id: "gateway-client", version: "dev", platform: "web", mode: "backend" },
        role: "operator",
        scopes: ["operator.admin","operator.read","operator.write","operator.approvals","operator.pairing"],
        caps: ["tool-events"],
        auth: { token: this.token }
      }
    }));
  }

  async request(method, params = {}) {
    if (!this.connected) throw new Error("Not connected");
    return new Promise((resolve, reject) => {
      const id    = String(this.nextId++);
      const timer = setTimeout(() => {
        this.pending.delete(id);
        reject(new Error(`Timeout: ${method}`));
      }, 15000);
      this.pending.set(id, { resolve, reject, timer });
      this.ws.send(JSON.stringify({ type: "req", id, method, params }));
    });
  }

  _rejectAll(msg) {
    for (const [, p] of this.pending) {
      clearTimeout(p.timer);
      p.reject(new Error(msg));
    }
    this.pending.clear();
  }

  _setStatus(s, reason) { this.onStatus?.(s, reason); }

  _scheduleReconnect() {
    const delay = Math.min(1000 * Math.pow(1.7, this.attempt), 15000);
    this.attempt++;
    this._rtimer = setTimeout(() => this.connect(), delay);
  }
}

// ─── App ────────────────────────────────────────────────────────────────────
const client      = new GatewayClient();
let   refreshTimer = null;
const eventLog    = [];
const MAX_EV      = 60;

// Status handler
client.onStatus = (status, reason) => {
  const dot = $("gw-dot");
  const txt = $("gw-txt");
  dot.className = "dot";

  switch (status) {
    case "connected":
      dot.classList.add("green");
      txt.textContent = "Connected";
      $("s-gw").textContent = "LIVE";
      $("s-gw").className   = "stat-val green";
      $("s-gw-sub").textContent = "gateway online";
      setErr(null);
      loadAll();
      break;

    case "reconnecting":
      dot.classList.add("amber");
      txt.textContent = `Reconnecting (${client.attempt})…`;
      $("s-gw").textContent = "RECONNECTING";
      $("s-gw").className   = "stat-val amber";
      break;

    case "connecting":
      dot.classList.add("amber");
      txt.textContent = "Connecting…";
      $("s-gw").textContent = "…";
      $("s-gw").className   = "stat-val amber";
      break;

    case "error":
      dot.classList.add("red");
      txt.textContent = "Error" + (reason ? `: ${reason}` : "");
      $("s-gw").textContent = "ERROR";
      $("s-gw").className   = "stat-val red";
      $("s-gw-sub").textContent = reason ?? "connection failed";
      setErr("Connection error: " + (reason ?? "Check gateway URL and token."));
      break;
  }
};

// Event handler
client.onEvent = (frame) => {
  const ts  = new Date().toLocaleTimeString("en-US", {hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const msg = JSON.stringify(frame.payload ?? {}).slice(0, 120);
  eventLog.unshift({ ts, type: frame.event ?? "?", msg });
  if (eventLog.length > MAX_EV) eventLog.pop();
  $("c-events").textContent = eventLog.length;
  renderEvents();
};

// ─── Render helpers ─────────────────────────────────────────────────────────
function renderEvents() {
  const body = $("p-events");
  if (!eventLog.length) { body.innerHTML = '<div class="empty">Waiting for events…</div>'; return; }
  body.innerHTML = "";
  for (const ev of eventLog) {
    const row = el("div", "ev-line");
    const ts  = el("span", "ev-ts",   ev.ts);
    const ty  = el("span", "ev-type", ev.type);
    const mg  = el("span", "ev-msg",  ev.msg);
    mg.title  = ev.msg;
    row.append(ts, ty, mg);
    body.appendChild(row);
  }
}

function renderAgents(data) {
  const body = $("p-agents");
  const cnt  = $("c-agents");
  const statEl = $("s-agents");
  const statSub= $("s-agents-sub");

  const agents = data?.agents ?? (Array.isArray(data) ? data : []);
  cnt.textContent = agents.length;
  statEl.textContent = agents.length;
  statSub.textContent = agents.length === 1 ? "agent" : "agents";

  if (!agents.length) { body.innerHTML = '<div class="empty">No agents configured</div>'; return; }

  const t = document.createElement("table");
  const hdr = t.insertRow();
  ["Name","Profile","Model","On"].forEach(h => {
    const th = document.createElement("th");
    th.textContent = h;
    hdr.appendChild(th);
  });

  for (const a of agents) {
    const tr  = t.insertRow();
    const name  = a.name || a.id || "—";
    const prof  = a.profile || a.agentProfile || "default";
    const model = (a.model?.primary || a.model || "—").replace("openrouter/","").replace(":free","");
    const on    = a.enabled !== false;

    const td1 = tr.insertCell(); td1.className = "trunc"; td1.textContent = name; td1.title = a.id ?? "";
    const td2 = tr.insertCell(); td2.textContent = prof.slice(0, 14);
    const td3 = tr.insertCell(); td3.style.color = "var(--muted)"; td3.textContent = model.slice(0, 28); td3.title = model;
    const td4 = tr.insertCell();
    const b   = el("span", "badge " + (on ? "badge-green" : "badge-muted"), on ? "on" : "off");
    td4.appendChild(b);
  }

  body.innerHTML = "";
  body.appendChild(t);
}

function renderStatus(data) {
  const channels = data?.channels ?? [];
  const wa = channels.find(c =>
    (c.type||c.channel||c.id||"").toLowerCase().includes("whatsapp")) ?? channels[0];

  if (wa) {
    const ok  = wa.linked || wa.online || wa.status === "connected" || wa.status === "listening";
    const num = wa.phone || wa.number || wa.accountId || "";
    $("s-wa").textContent = ok ? "✓" : "✗";
    $("s-wa").className   = "stat-val " + (ok ? "green" : "red");
    $("s-wa-sub").textContent = num || (ok ? "linked" : "not linked");
  } else {
    $("s-wa").textContent = "?";
    $("s-wa").className   = "stat-val amber";
    $("s-wa-sub").textContent = "no channel data";
  }
}

function renderSessions(data) {
  const body     = $("p-sessions");
  const cnt      = $("c-sessions");
  const sessions = data?.sessions ?? (Array.isArray(data) ? data : []);

  cnt.textContent = sessions.length;
  if (!sessions.length) { body.innerHTML = '<div class="empty">No sessions</div>'; return; }

  const t = document.createElement("table");
  const hdr = t.insertRow();
  ["Session","Agent","Channel","Last"].forEach(h => {
    const th = document.createElement("th"); th.textContent = h; hdr.appendChild(th);
  });

  for (const s of sessions.slice(0, 25)) {
    const tr = t.insertRow();
    const id = (s.id || s.sessionId || "—").slice(0, 12);
    const ag = (s.agentId || s.agent || "—").slice(0, 14);
    const ch = (s.channelId || s.channel || "—").slice(0, 12);
    const ts = fmtRelative(s.updatedAt || s.lastMessageAt || s.createdAt);
    [id, ag, ch, ts].forEach(v => { const td = tr.insertCell(); td.textContent = v; });
  }

  body.innerHTML = "";
  body.appendChild(t);
}

function renderCron(data) {
  const body = $("p-cron");
  const cnt  = $("c-cron");
  const jobs = data?.jobs ?? (Array.isArray(data) ? data : []);

  cnt.textContent = jobs.length;
  if (!jobs.length) { body.innerHTML = '<div class="empty">No cron jobs</div>'; return; }

  body.innerHTML = "";
  for (const j of jobs) {
    const row  = el("div", "kv");
    const key  = el("span", "kv-key", j.schedule || j.cron || "—");
    const val  = el("span", "kv-val", j.name || j.id || "—");
    val.title  = JSON.stringify(j);
    row.append(key, val);
    body.appendChild(row);
  }
}

function renderConfig(data) {
  const body = $("p-config");
  if (!data || data.error) { body.innerHTML = '<div class="empty">—</div>'; return; }

  const model    = data?.agents?.defaults?.model?.primary
    ?? data?.model?.primary ?? "—";
  const authMode = data?.gateway?.auth?.mode ?? "—";
  const proxies  = (data?.gateway?.trustedProxies ?? []).join(", ") || "—";

  const entries = [
    ["model",        model.replace("openrouter/", "")],
    ["auth.mode",    authMode],
    ["trusted IPs",  proxies],
  ];

  body.innerHTML = "";
  for (const [k, v] of entries) {
    const row = el("div", "kv");
    const kEl = el("span", "kv-key", k);
    const vEl = el("span", "kv-val", v);
    vEl.title = v;
    row.append(kEl, vEl);
    body.appendChild(row);
  }
}

function renderApprovals(data) {
  const items = data?.approvals ?? (Array.isArray(data) ? data : []);
  const n     = items.length;
  $("s-approvals").textContent = n;
  $("s-approvals").className   = "stat-val " + (n > 0 ? "amber" : "green");
}

// ─── Data loading ────────────────────────────────────────────────────────────
async function loadAll() {
  clearTimeout(refreshTimer);
  $("sync-time").textContent = "Syncing…";

  const safe = fn => fn.catch(err => ({ _err: err.message }));

  const [agents, statusData, sessions, cron, cfg, approvals] = await Promise.all([
    safe(client.request("agents.list",        {})),
    safe(client.request("status",             {})),
    safe(client.request("sessions.list",      {})),
    safe(client.request("cron.list",          {})),
    safe(client.request("config.get",         {})),
    safe(client.request("exec.approvals.get", {})),
  ]);

  renderAgents(agents);
  renderStatus(statusData);
  renderSessions(sessions);
  renderCron(cron);
  renderConfig(cfg);
  renderApprovals(approvals);

  $("sync-time").textContent = "Updated " + new Date().toLocaleTimeString();
  refreshTimer = setTimeout(loadAll, 30_000);
}

// ─── Controls ────────────────────────────────────────────────────────────────
function doConnect() {
  clearTimeout(refreshTimer);
  client.connect();
}

function manualRefresh() {
  if (client.connected) loadAll();
  else client.connect();
}

// ─── Boot ────────────────────────────────────────────────────────────────────
